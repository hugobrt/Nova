<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard {{ guild_id }}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

<nav class="bg-slate-800 px-6 py-4 flex items-center justify-between shadow">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🚌</span>
    <span class="font-bold text-lg">Dashboard Admin</span>
  </div>
  <div class="flex items-center gap-4 text-sm text-slate-300">
    <span>Connecté : <span class="font-semibold text-white">{{ user.username }}</span></span>
    <a href="/logout" class="text-red-400 hover:text-red-300">Déconnexion</a>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">

  <div class="flex gap-2 mb-8 border-b border-slate-700 flex-wrap">
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-indigo-500 text-white" data-tab="stats">Statistiques</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="members">Membres</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="jobs">Offres d'emploi</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="employees">Employés</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="leaves">Congés</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="incidents">Incidents</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="tickets">Tickets</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="announce">Annonces</button>
    <button class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="config">Configuration</button>
  </div>

  <!-- STATS -->
  <div id="tab-stats" class="tab-content grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-slate-800 rounded-xl p-5"><div class="text-slate-400 text-sm">Membres</div><div id="stat-members" class="text-3xl font-bold mt-1">-</div></div>
    <div class="bg-slate-800 rounded-xl p-5"><div class="text-slate-400 text-sm">Humains / Bots</div><div id="stat-humans" class="text-3xl font-bold mt-1">-</div></div>
    <div class="bg-slate-800 rounded-xl p-5"><div class="text-slate-400 text-sm">Salons</div><div id="stat-channels" class="text-3xl font-bold mt-1">-</div></div>
    <div class="bg-slate-800 rounded-xl p-5"><div class="text-slate-400 text-sm">Rôles</div><div id="stat-roles" class="text-3xl font-bold mt-1">-</div></div>
  </div>

  <!-- MEMBRES -->
  <div id="tab-members" class="tab-content hidden">
    <div class="bg-slate-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-700 text-slate-300">
          <tr><th class="text-left px-4 py-3">Membre</th><th class="text-left px-4 py-3">Rôles</th><th class="text-left px-4 py-3">Arrivé le</th></tr>
        </thead>
        <tbody id="members-body"></tbody>
      </table>
    </div>
  </div>

  <!-- OFFRES D'EMPLOI -->
  <div id="tab-jobs" class="tab-content hidden space-y-6">

    <div class="bg-slate-800 rounded-xl p-6">
      <h3 class="font-bold text-lg mb-4">📝 Publier une nouvelle offre</h3>
      <form id="job-form" class="space-y-4 max-w-2xl">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Titre du poste</label>
          <input type="text" name="title" required maxlength="100" class="w-full bg-slate-700 rounded-lg px-3 py-2" placeholder="Ex : Chauffeur de bus ligne A">
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Description</label>
          <textarea name="description" rows="4" required class="w-full bg-slate-700 rounded-lg px-3 py-2" placeholder="Description du poste et des attentes..."></textarea>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Rôle attribué si accepté (optionnel)</label>
          <select name="role_id" id="job-role-select" class="role-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
        </div>
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-6 py-2 font-semibold">Publier l'offre</button>
        <span id="job-created" class="ml-3 text-green-400 hidden">✅ Offre publiée</span>
        <span id="job-error" class="ml-3 text-red-400 hidden"></span>
      </form>
    </div>

    <div id="jobs-list" class="grid gap-4"></div>
  </div>

  <!-- FICHE CANDIDATURES D'UNE OFFRE -->
  <div id="job-applications-panel" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-slate-800 rounded-xl max-w-3xl w-full max-h-[85vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg" id="job-applications-title">Candidatures</h3>
        <button onclick="closeApplicationsPanel()" class="text-slate-400 hover:text-white text-xl">✕</button>
      </div>
      <div id="job-applications-list" class="space-y-4"></div>
    </div>
  </div>

  <!-- EMPLOYÉS -->
  <div id="tab-employees" class="tab-content hidden space-y-4">
    <div id="employees-list" class="grid gap-4"></div>
  </div>

  <!-- CONGÉS -->
  <div id="tab-leaves" class="tab-content hidden space-y-4">
    <div class="flex gap-2 mb-2">
      <button class="leave-filter-btn px-3 py-1 rounded-full text-sm bg-indigo-600" data-status="pending">En attente</button>
      <button class="leave-filter-btn px-3 py-1 rounded-full text-sm bg-slate-700" data-status="">Toutes</button>
    </div>
    <div id="leaves-list" class="grid gap-4"></div>
  </div>

  <!-- INCIDENTS -->
  <div id="tab-incidents" class="tab-content hidden space-y-4">
    <div class="flex gap-2 mb-2">
      <button class="incident-filter-btn px-3 py-1 rounded-full text-sm bg-indigo-600" data-status="open">Ouverts</button>
      <button class="incident-filter-btn px-3 py-1 rounded-full text-sm bg-slate-700" data-status="">Tous</button>
    </div>
    <div id="incidents-list" class="grid gap-4"></div>
  </div>

  <!-- TICKETS -->
  <div id="tab-tickets" class="tab-content hidden space-y-4">
    <div class="flex gap-2 mb-2">
      <button class="ticket-filter-btn px-3 py-1 rounded-full text-sm bg-indigo-600" data-status="open">Ouverts</button>
      <button class="ticket-filter-btn px-3 py-1 rounded-full text-sm bg-slate-700" data-status="">Tous</button>
    </div>
    <div id="tickets-list" class="grid gap-4"></div>
  </div>

  <!-- ANNONCES -->
  <div id="tab-announce" class="tab-content hidden">
    <form id="announce-form" class="bg-slate-800 rounded-xl p-6 space-y-5 max-w-2xl" enctype="multipart/form-data">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon de destination</label>
        <select name="channel_id" id="announce-channel" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Type de message</label>
        <select name="mode" id="announce-mode" class="w-full bg-slate-700 rounded-lg px-3 py-2">
          <option value="embed">Embed (avec titre + couleur)</option>
          <option value="plain">Message simple</option>
        </select>
      </div>
      <div id="announce-title-wrap">
        <label class="block text-sm text-slate-400 mb-1">Titre (embed uniquement)</label>
        <input type="text" name="title" maxlength="256" class="w-full bg-slate-700 rounded-lg px-3 py-2" placeholder="Ex : Annonce importante">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Contenu du message</label>
        <textarea name="content" rows="6" maxlength="4000" required class="w-full bg-slate-700 rounded-lg px-3 py-2" placeholder="Ton message ici... (Markdown Discord supporté)"></textarea>
      </div>
      <div id="announce-color-wrap">
        <label class="block text-sm text-slate-400 mb-1">Couleur de l'embed</label>
        <select name="color" class="w-full bg-slate-700 rounded-lg px-3 py-2">
          <option value="blurple">Blurple</option>
          <option value="green">Vert</option>
          <option value="red">Rouge</option>
          <option value="orange">Orange</option>
          <option value="gold">Or</option>
          <option value="greyple">Gris</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Image jointe (optionnel)</label>
        <input type="file" name="image" accept="image/*" class="w-full bg-slate-700 rounded-lg px-3 py-2">
      </div>
      <label class="flex items-center gap-2 text-sm text-slate-300">
        <input type="checkbox" name="mention_everyone" class="rounded">
        Mentionner @everyone
      </label>
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-6 py-2 font-semibold">Envoyer le message</button>
      <span id="announce-sent" class="ml-3 text-green-400 hidden">✅ Message envoyé</span>
      <span id="announce-error" class="ml-3 text-red-400 hidden"></span>
    </form>
  </div>

  <!-- CONFIGURATION -->
  <div id="tab-config" class="tab-content hidden">
    <form id="config-form" class="bg-slate-800 rounded-xl p-6 space-y-5 max-w-xl">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon règlement</label>
        <select name="rules_channel_id" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon de bienvenue</label>
        <select name="welcome_channel_id" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Rôle membre (accepté le règlement)</label>
        <select name="member_role_id" class="role-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon des offres d'emploi</label>
        <select name="jobs_channel_id" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Rôle employé (attribué à l'embauche)</label>
        <select name="employee_role_id" class="role-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Rôle RH (peut gérer offres/employés sans être admin)</label>
        <select name="hr_role_id" class="role-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon du portail employé (congés/incidents/tickets)</label>
        <select name="employee_portal_channel_id" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Salon de log RH (notifications congés/incidents)</label>
        <select name="hr_log_channel_id" class="channel-select w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Catégorie des tickets (salons privés créés automatiquement)</label>
        <select name="tickets_category_id" id="config-tickets-category" class="w-full bg-slate-700 rounded-lg px-3 py-2"></select>
      </div>
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-6 py-2 font-semibold">Enregistrer</button>
      <span id="config-saved" class="ml-3 text-green-400 hidden">✅ Enregistré</span>
    </form>
  </div>

</div>

<script>
const GUILD_ID = "{{ guild_id }}";

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('border-indigo-500', 'text-white');
      b.classList.add('border-transparent', 'text-slate-400');
    });
    btn.classList.add('border-indigo-500', 'text-white');
    btn.classList.remove('border-transparent', 'text-slate-400');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
    if (btn.dataset.tab === 'members') loadMembers();
    if (btn.dataset.tab === 'jobs') { loadJobs(); loadJobRoleSelect(); }
    if (btn.dataset.tab === 'employees') loadEmployees();
    if (btn.dataset.tab === 'leaves') loadLeaves('pending');
    if (btn.dataset.tab === 'incidents') loadIncidents('open');
    if (btn.dataset.tab === 'tickets') loadTickets('open');
    if (btn.dataset.tab === 'config') loadConfig();
    if (btn.dataset.tab === 'announce') loadAnnounceChannels();
  });
});

async function loadStats() {
  const res = await fetch(`/api/${GUILD_ID}/stats`);
  if (!res.ok) return;
  const d = await res.json();
  document.getElementById('stat-members').textContent = d.members_total;
  document.getElementById('stat-humans').textContent = `${d.humans} / ${d.bots}`;
  document.getElementById('stat-channels').textContent = d.channels;
  document.getElementById('stat-roles').textContent = d.roles;
}

async function loadMembers() {
  const res = await fetch(`/api/${GUILD_ID}/members?limit=200`);
  if (!res.ok) return;
  const members = await res.json();
  const body = document.getElementById('members-body');
  body.innerHTML = members.map(m => `
    <tr class="border-t border-slate-700">
      <td class="px-4 py-2">${m.name}</td>
      <td class="px-4 py-2 text-slate-400">${m.roles.join(', ')}</td>
      <td class="px-4 py-2 text-slate-400">${m.joined_at ? new Date(m.joined_at).toLocaleDateString('fr-FR') : ''}</td>
    </tr>`).join('');
}

// --- Offres d'emploi ---
async function loadJobRoleSelect() {
  const res = await fetch(`/api/${GUILD_ID}/roles`);
  if (!res.ok) return;
  const roles = await res.json();
  document.getElementById('job-role-select').innerHTML =
    '<option value="">Aucun rôle</option>' + roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

document.getElementById('job-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const body = Object.fromEntries(formData.entries());
  const errorEl = document.getElementById('job-error');
  const createdEl = document.getElementById('job-created');
  errorEl.classList.add('hidden'); createdEl.classList.add('hidden');
  const res = await fetch(`/api/${GUILD_ID}/jobs`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
  });
  if (res.ok) {
    createdEl.classList.remove('hidden'); e.target.reset();
    setTimeout(() => createdEl.classList.add('hidden'), 3000);
    loadJobs();
  } else {
    const err = await res.json();
    errorEl.textContent = '⚠️ ' + (err.detail || 'Erreur.');
    errorEl.classList.remove('hidden');
  }
});

async function loadJobs() {
  const res = await fetch(`/api/${GUILD_ID}/jobs`);
  const container = document.getElementById('jobs-list');
  if (!res.ok) { container.innerHTML = '<p class="text-red-400">Accès refusé (rôle RH requis).</p>'; return; }
  const jobs = await res.json();
  if (jobs.length === 0) { container.innerHTML = '<p class="text-slate-400">Aucune offre publiée pour l\'instant.</p>'; return; }
  container.innerHTML = jobs.map(job => `
    <div class="bg-slate-800 rounded-xl p-5">
      <div class="flex justify-between items-start">
        <div>
          <h3 class="font-bold text-lg">${job.title} <span class="text-sm font-normal text-slate-400">#${job.id}</span></h3>
          <p class="text-slate-400 text-sm mt-1">${job.description}</p>
        </div>
        <span class="text-xs px-2 py-1 rounded-full ${job.status === 'open' ? 'bg-green-700' : 'bg-slate-600'}">${job.status === 'open' ? 'Ouvert' : 'Clôturé'}</span>
      </div>
      <div class="mt-3 flex items-center gap-3">
        <button onclick="openApplicationsPanel('${job.id}', '${job.title.replace(/'/g, "\\'")}')" class="text-sm bg-indigo-700 hover:bg-indigo-600 transition rounded-lg px-3 py-1">
          👥 ${job.applications.length} candidature(s)
        </button>
        ${job.status === 'open' ? `<button onclick="closeJob('${job.id}')" class="text-sm bg-red-700 hover:bg-red-600 transition rounded-lg px-3 py-1">Clôturer</button>` : ''}
      </div>
    </div>`).join('');
}
async function closeJob(jobId) {
  await fetch(`/api/${GUILD_ID}/jobs/${jobId}/close`, { method: 'POST' });
  loadJobs();
}

// --- Fiche candidatures (panel modal) ---
async function openApplicationsPanel(jobId, jobTitle) {
  document.getElementById('job-applications-title').textContent = `Candidatures — ${jobTitle}`;
  document.getElementById('job-applications-panel').classList.remove('hidden');
  const res = await fetch(`/api/${GUILD_ID}/jobs/${jobId}/applications`);
  const list = document.getElementById('job-applications-list');
  if (!res.ok) { list.innerHTML = '<p class="text-red-400">Accès refusé.</p>'; return; }
  const apps = await res.json();
  if (apps.length === 0) { list.innerHTML = '<p class="text-slate-400">Aucune candidature pour cette offre.</p>'; return; }
  list.innerHTML = apps.map(a => `
    <div class="bg-slate-700 rounded-xl p-4">
      <div class="flex items-start gap-3">
        ${a.avatar ? `<img src="${a.avatar}" class="w-12 h-12 rounded-full">` : '<div class="w-12 h-12 rounded-full bg-slate-600"></div>'}
        <div class="flex-1">
          <p class="font-bold">${a.username} ${!a.in_guild ? '<span class="text-xs text-red-400">(a quitté le serveur)</span>' : ''}</p>
          <p class="text-xs text-slate-400">Compte créé le ${a.account_created_at ? new Date(a.account_created_at).toLocaleDateString('fr-FR') : '-'}</p>
          <p class="text-xs text-slate-400">Arrivé sur le serveur le ${a.joined_at ? new Date(a.joined_at).toLocaleDateString('fr-FR') : '-'}</p>
          <p class="text-xs text-slate-400 mt-1">Rôles actuels : ${a.roles.length ? a.roles.join(', ') : 'Aucun'}</p>
        </div>
        <span class="text-xs px-2 py-1 rounded-full ${a.status === 'accepted' ? 'bg-green-700' : a.status === 'refused' ? 'bg-red-700' : 'bg-yellow-700'}">${a.status}</span>
      </div>
      <div class="mt-3 text-sm">
        <p class="text-slate-300"><span class="text-slate-500">Motivation :</span> ${a.motivation || '-'}</p>
        <p class="text-slate-300 mt-1"><span class="text-slate-500">Disponibilités :</span> ${a.disponibilite || '-'}</p>
      </div>
      ${a.status === 'pending' ? `
      <div class="mt-3 flex gap-2">
        <button onclick="acceptApplication('${a.job_id}', '${a.user_id}', '${jobTitle.replace(/'/g, "\\'")}')" class="text-sm bg-green-700 hover:bg-green-600 transition rounded-lg px-3 py-1">✅ Accepter</button>
        <button onclick="denyApplication('${a.job_id}', '${a.user_id}', '${jobTitle.replace(/'/g, "\\'")}')" class="text-sm bg-red-700 hover:bg-red-600 transition rounded-lg px-3 py-1">❌ Refuser</button>
      </div>` : ''}
    </div>`).join('');
}
function closeApplicationsPanel() {
  document.getElementById('job-applications-panel').classList.add('hidden');
}
async function acceptApplication(jobId, userId, jobTitle) {
  await fetch(`/api/${GUILD_ID}/jobs/${jobId}/applications/${userId}/accept`, { method: 'POST' });
  openApplicationsPanel(jobId, jobTitle);
  loadJobs();
}
async function denyApplication(jobId, userId, jobTitle) {
  await fetch(`/api/${GUILD_ID}/jobs/${jobId}/applications/${userId}/deny`, { method: 'POST' });
  openApplicationsPanel(jobId, jobTitle);
  loadJobs();
}

// --- Employés ---
async function loadEmployees() {
  const res = await fetch(`/api/${GUILD_ID}/employees?status=active`);
  const container = document.getElementById('employees-list');
  if (!res.ok) { container.innerHTML = '<p class="text-red-400">Accès refusé (rôle RH requis).</p>'; return; }
  const employees = await res.json();
  if (employees.length === 0) { container.innerHTML = '<p class="text-slate-400">Aucun employé actif.</p>'; return; }
  container.innerHTML = employees.map(e => `
    <div class="bg-slate-800 rounded-xl p-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        ${e.avatar ? `<img src="${e.avatar}" class="w-10 h-10 rounded-full">` : '<div class="w-10 h-10 rounded-full bg-slate-600"></div>'}
        <div>
          <p class="font-bold">${e.username}</p>
          <p class="text-slate-400 text-sm">Embauché le ${new Date(e.hired_at).toLocaleDateString('fr-FR')}</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="sanctionEmployee('${e.user_id}')" class="text-sm bg-yellow-700 hover:bg-yellow-600 transition rounded-lg px-3 py-1">⚠️ Sanctionner</button>
        <button onclick="fireEmployee('${e.user_id}')" class="text-sm bg-red-700 hover:bg-red-600 transition rounded-lg px-3 py-1">🚪 Virer</button>
      </div>
    </div>`).join('');
}
async function sanctionEmployee(userId) {
  const reason = prompt("Raison de la sanction :");
  if (!reason) return;
  await fetch(`/api/${GUILD_ID}/employees/${userId}/sanction`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({reason}) });
  loadEmployees();
}
async function fireEmployee(userId) {
  const reason = prompt("Raison du licenciement :");
  if (!reason) return;
  await fetch(`/api/${GUILD_ID}/employees/${userId}/fire`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({reason}) });
  loadEmployees();
}

// --- Annonces ---
async function loadAnnounceChannels() {
  const res = await fetch(`/api/${GUILD_ID}/channels`);
  if (!res.ok) return;
  const channels = await res.json();
  document.getElementById('announce-channel').innerHTML = channels.map(c => `<option value="${c.id}">#${c.name}</option>`).join('');
}
document.getElementById('announce-mode').addEventListener('change', (e) => {
  const isEmbed = e.target.value === 'embed';
  document.getElementById('announce-title-wrap').style.display = isEmbed ? 'block' : 'none';
  document.getElementById('announce-color-wrap').style.display = isEmbed ? 'block' : 'none';
});
document.getElementById('announce-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  formData.set('mention_everyone', e.target.mention_everyone.checked ? 'true' : 'false');
  const errorEl = document.getElementById('announce-error');
  const sentEl = document.getElementById('announce-sent');
  errorEl.classList.add('hidden'); sentEl.classList.add('hidden');
  const res = await fetch(`/api/${GUILD_ID}/send_message`, { method: 'POST', body: formData });
  if (res.ok) { sentEl.classList.remove('hidden'); e.target.reset(); setTimeout(() => sentEl.classList.add('hidden'), 3000); }
  else { const err = await res.json(); errorEl.textContent = '⚠️ ' + (err.detail || 'Erreur.'); errorEl.classList.remove('hidden'); }
});

// --- Configuration ---
async function loadConfig() {
  const [channelsRes, rolesRes, categoriesRes, configRes] = await Promise.all([
    fetch(`/api/${GUILD_ID}/channels`), fetch(`/api/${GUILD_ID}/roles`),
    fetch(`/api/${GUILD_ID}/categories`), fetch(`/api/${GUILD_ID}/config`),
  ]);
  const channels = await channelsRes.json();
  const roles = await rolesRes.json();
  const categories = await categoriesRes.json();
  const config = await configRes.json();
  document.querySelectorAll('.channel-select').forEach(select => {
    const current = config[select.name];
    select.innerHTML = '<option value="">Aucun</option>' + channels.map(c => `<option value="${c.id}" ${c.id == current ? 'selected' : ''}>#${c.name}</option>`).join('');
  });
  document.querySelectorAll('.role-select').forEach(select => {
    const current = config[select.name];
    select.innerHTML = '<option value="">Aucun</option>' + roles.map(r => `<option value="${r.id}" ${r.id == current ? 'selected' : ''}>${r.name}</option>`).join('');
  });
  const catSelect = document.getElementById('config-tickets-category');
  const currentCat = config['tickets_category_id'];
  catSelect.innerHTML = '<option value="">Aucune</option>' + categories.map(c => `<option value="${c.id}" ${c.id == currentCat ? 'selected' : ''}>${c.name}</option>`).join('');
}
document.getElementById('config-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const body = Object.fromEntries(formData.entries());
  const saved = document.getElementById('config-saved');
  saved.classList.add('hidden');
  const res = await fetch(`/api/${GUILD_ID}/config`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (res.ok) {
    const updated = await res.json();
    saved.textContent = '✅ Enregistré';
    saved.classList.remove('text-red-400');
    saved.classList.add('text-green-400');
    saved.classList.remove('hidden');
    setTimeout(() => saved.classList.add('hidden'), 2500);
    loadConfig();
  } else {
    let detail = 'Erreur inconnue.';
    try { const err = await res.json(); detail = err.detail || detail; } catch (e2) {}
    saved.textContent = '⚠️ Échec : ' + detail;
    saved.classList.remove('text-green-400');
    saved.classList.add('text-red-400');
    saved.classList.remove('hidden');
  }
  loadStats();
});

// --- Congés ---
document.querySelectorAll('.leave-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.leave-filter-btn').forEach(b => b.classList.replace('bg-indigo-600', 'bg-slate-700'));
    btn.classList.replace('bg-slate-700', 'bg-indigo-600');
    loadLeaves(btn.dataset.status);
  });
});
async function loadLeaves(status) {
  const url = status ? `/api/${GUILD_ID}/leave_requests?status=${status}` : `/api/${GUILD_ID}/leave_requests`;
  const res = await fetch(url);
  const container = document.getElementById('leaves-list');
  if (!res.ok) { container.innerHTML = '<p class="text-red-400">Accès refusé (rôle RH requis).</p>'; return; }
  const items = await res.json();
  if (items.length === 0) { container.innerHTML = '<p class="text-slate-400">Aucune demande.</p>'; return; }
  container.innerHTML = items.map(l => `
    <div class="bg-slate-800 rounded-xl p-5">
      <div class="flex justify-between items-start">
        <div class="flex items-center gap-3">
          ${l.avatar ? `<img src="${l.avatar}" class="w-10 h-10 rounded-full">` : '<div class="w-10 h-10 rounded-full bg-slate-600"></div>'}
          <div>
            <p class="font-bold">${l.username}</p>
            <p class="text-slate-400 text-sm">${l.start_date} → ${l.end_date}</p>
          </div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full ${l.status === 'accepted' ? 'bg-green-700' : l.status === 'refused' ? 'bg-red-700' : 'bg-yellow-700'}">${l.status}</span>
      </div>
      ${l.reason ? `<p class="text-slate-300 text-sm mt-3">${l.reason}</p>` : ''}
      ${l.status === 'pending' ? `
      <div class="mt-3 flex gap-2">
        <button onclick="acceptLeave('${l.id}')" class="text-sm bg-green-700 hover:bg-green-600 transition rounded-lg px-3 py-1">✅ Accepter</button>
        <button onclick="denyLeave('${l.id}')" class="text-sm bg-red-700 hover:bg-red-600 transition rounded-lg px-3 py-1">❌ Refuser</button>
      </div>` : ''}
    </div>`).join('');
}
async function acceptLeave(id) { await fetch(`/api/${GUILD_ID}/leave_requests/${id}/accept`, { method: 'POST' }); loadLeaves('pending'); }
async function denyLeave(id) { await fetch(`/api/${GUILD_ID}/leave_requests/${id}/deny`, { method: 'POST' }); loadLeaves('pending'); }

// --- Incidents ---
document.querySelectorAll('.incident-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.incident-filter-btn').forEach(b => b.classList.replace('bg-indigo-600', 'bg-slate-700'));
    btn.classList.replace('bg-slate-700', 'bg-indigo-600');
    loadIncidents(btn.dataset.status);
  });
});
async function loadIncidents(status) {
  const url = status ? `/api/${GUILD_ID}/incidents?status=${status}` : `/api/${GUILD_ID}/incidents`;
  const res = await fetch(url);
  const container = document.getElementById('incidents-list');
  if (!res.ok) { container.innerHTML = '<p class="text-red-400">Accès refusé (rôle RH requis).</p>'; return; }
  const items = await res.json();
  if (items.length === 0) { container.innerHTML = '<p class="text-slate-400">Aucun rapport.</p>'; return; }
  container.innerHTML = items.map(i => `
    <div class="bg-slate-800 rounded-xl p-5">
      <div class="flex justify-between items-start">
        <div class="flex items-center gap-3">
          ${i.avatar ? `<img src="${i.avatar}" class="w-10 h-10 rounded-full">` : '<div class="w-10 h-10 rounded-full bg-slate-600"></div>'}
          <div>
            <p class="font-bold">${i.username}</p>
            <p class="text-slate-400 text-sm">${i.incident_type}${i.line_info ? ' — ' + i.line_info : ''}</p>
          </div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full ${i.status === 'resolved' ? 'bg-green-700' : i.status === 'dismissed' ? 'bg-slate-600' : 'bg-orange-700'}">${i.status}</span>
      </div>
      <p class="text-slate-300 text-sm mt-3">${i.description}</p>
      ${i.resolution_note ? `<p class="text-slate-500 text-xs mt-2">Note : ${i.resolution_note}</p>` : ''}
      ${i.status === 'open' ? `
      <div class="mt-3 flex gap-2">
        <button onclick="resolveIncident('${i.id}')" class="text-sm bg-green-700 hover:bg-green-600 transition rounded-lg px-3 py-1">✅ Résoudre</button>
        <button onclick="dismissIncident('${i.id}')" class="text-sm bg-slate-600 hover:bg-slate-500 transition rounded-lg px-3 py-1">🗑️ Classer sans suite</button>
      </div>` : ''}
    </div>`).join('');
}
async function resolveIncident(id) {
  const note = prompt("Note de résolution (optionnel) :") || "";
  await fetch(`/api/${GUILD_ID}/incidents/${id}/resolve`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({note}) });
  loadIncidents('open');
}
async function dismissIncident(id) {
  const note = prompt("Note (optionnel) :") || "";
  await fetch(`/api/${GUILD_ID}/incidents/${id}/dismiss`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({note}) });
  loadIncidents('open');
}

// --- Tickets ---
document.querySelectorAll('.ticket-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ticket-filter-btn').forEach(b => b.classList.replace('bg-indigo-600', 'bg-slate-700'));
    btn.classList.replace('bg-slate-700', 'bg-indigo-600');
    loadTickets(btn.dataset.status);
  });
});
async function loadTickets(status) {
  const url = status ? `/api/${GUILD_ID}/tickets?status=${status}` : `/api/${GUILD_ID}/tickets`;
  const res = await fetch(url);
  const container = document.getElementById('tickets-list');
  if (!res.ok) { container.innerHTML = '<p class="text-red-400">Accès refusé (rôle RH requis).</p>'; return; }
  const items = await res.json();
  if (items.length === 0) { container.innerHTML = '<p class="text-slate-400">Aucun ticket.</p>'; return; }
  container.innerHTML = items.map(t => `
    <div class="bg-slate-800 rounded-xl p-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        ${t.avatar ? `<img src="${t.avatar}" class="w-10 h-10 rounded-full">` : '<div class="w-10 h-10 rounded-full bg-slate-600"></div>'}
        <div>
          <p class="font-bold">${t.subject}</p>
          <p class="text-slate-400 text-sm">${t.username}${t.channel_name ? ' — #' + t.channel_name : ''}</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs px-2 py-1 rounded-full ${t.status === 'closed' ? 'bg-slate-600' : 'bg-green-700'}">${t.status}</span>
        ${t.status === 'open' ? `<button onclick="closeTicket('${t.id}')" class="text-sm bg-red-700 hover:bg-red-600 transition rounded-lg px-3 py-1">🔒 Fermer</button>` : ''}
      </div>
    </div>`).join('');
}
async function closeTicket(id) {
  await fetch(`/api/${GUILD_ID}/tickets/${id}/close`, { method: 'POST' });
  loadTickets('open');
}

loadStats();
</script>
</body>
